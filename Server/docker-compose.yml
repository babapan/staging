services:
  app:
    build: .
    container_name: max99-backend
    restart: always
    ports:
      - "127.0.0.1:5100:5000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - SESSION_SECRET=${SESSION_SECRET}
      - REDIS_URL=redis://redis:6379
      - COOKIE_SECURE=false
      - JWT_SECRET=${JWT_SECRET}
      - BREVO_API_KEY=${BREVO_API_KEY}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-migme-internal-admin-2024}
      # Public URL untuk konstruksi URL file upload (musik lokal, dll)
      # Isi di .env: PUBLIC_API_URL=https://api.chatmeapp.my.id
      - PUBLIC_API_URL=${PUBLIC_API_URL}
      # Self-hosted CDN base URL — subdomain untuk serve file gambar/video
      # DNS: A  img.chatmeapp.my.id → IP_SERVER_AWS
      # nginx: lihat Server/nginx-img.conf
      - IMG_BASE_URL=${IMG_BASE_URL:-https://img.chatmeapp.my.id}
      - UPLOADS_DIR=/app/uploads
      # ── LiveKit Dual Provider ──────────────────────────────────────────────
      # LIVEKIT_MODE: auto | cloud | selfhosted
      #   auto      → pakai Cloud jika Cloud credentials tersedia, else self-hosted
      #   cloud     → paksa LiveKit Cloud (container livekit tidak dipakai)
      #   selfhosted → paksa self-hosted Docker (butuh container livekit berjalan)
      - LIVEKIT_MODE=${LIVEKIT_MODE:-auto}
      # Self-hosted (container max99-livekit di bawah)
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}
      # URL self-hosted dikirim ke klien mobile via nginx reverse proxy
      # Contoh: LIVEKIT_URL=wss://livekit.chatmeapp.my.id
      - LIVEKIT_URL=${LIVEKIT_URL}
      # LiveKit Cloud (https://cloud.livekit.io — gratis 10k menit/bulan)
      - LIVEKIT_CLOUD_URL=${LIVEKIT_CLOUD_URL}
      - LIVEKIT_CLOUD_API_KEY=${LIVEKIT_CLOUD_API_KEY}
      - LIVEKIT_CLOUD_API_SECRET=${LIVEKIT_CLOUD_API_SECRET}
    volumes:
      - uploads-data:/app/uploads
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      livekit:
        condition: service_started
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - chatmeapp.my.id

  # ── PostgreSQL (self-hosted, menggantikan Neon) ─────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: max99-postgres
    restart: always
    ports:
      # Hanya expose ke localhost — tidak boleh terbuka ke publik
      - "127.0.0.1:5433:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-migmedb}
      - POSTGRES_USER=${POSTGRES_USER:-migme}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-migme} -d ${POSTGRES_DB:-migmedb}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - chatmeapp.my.id

  # ── LiveKit Server (self-hosted audio) ─────────────────────────────────────
  livekit:
    image: livekit/livekit-server:latest
    container_name: max99-livekit
    restart: always
    entrypoint:
      - /bin/sh
      - -c
      - |
        echo "keys:" > /run/livekit_full.yaml
        echo "  $$LIVEKIT_API_KEY: $$LIVEKIT_API_SECRET" >> /run/livekit_full.yaml
        cat /livekit.yaml >> /run/livekit_full.yaml
        exec /livekit-server --config /run/livekit_full.yaml
    environment:
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}
    ports:
      - "127.0.0.1:7880:7880"
      - "0.0.0.0:7881:7881"
      - "0.0.0.0:50000-50200:50000-50200/udp"
    volumes:
      - ./livekit.yaml:/livekit.yaml:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:7880/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - chatmeapp.my.id

  admin:
    build: ./admin
    container_name: max99-admin
    restart: always
    ports:
      - "127.0.0.1:3101:3001"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_JWT_SECRET=${ADMIN_JWT_SECRET}
      - ADMIN_PORT=3001
      - IMG_BASE_URL=${IMG_BASE_URL:-https://img.chatmeapp.my.id}
      - UPLOADS_DIR=/app/uploads
      - APK_UPLOAD_DIR=/app/apk-uploads
      - WEB_HOST=https://web.chatmeapp.my.id
      - MAIN_APP_URL=http://app:5000
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-migme-internal-admin-2024}
    volumes:
      - apk-files:/app/apk-uploads
      - uploads-data:/app/uploads
    depends_on:
      - app
      - postgres
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    networks:
      - chatmeapp.my.id

  web:
    build: ./web
    container_name: max99-web
    restart: always
    ports:
      - "127.0.0.1:3102:3002"
    environment:
      - NODE_ENV=production
      - WEB_PORT=3002
      - APK_UPLOAD_DIR=/app/apk-files
    volumes:
      - apk-files:/app/apk-files:ro
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    networks:
      - chatmeapp.my.id

  redis:
    image: redis:7-alpine
    container_name: max99-redis
    restart: always
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - chatmeapp.my.id

volumes:
  redis-data:
  apk-files:
  uploads-data:
  postgres-data:

networks:
  chatmeapp.my.id:
    driver: bridge
